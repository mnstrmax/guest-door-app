name: "Guest Door App"
version: "1.12.1"
slug: "guest_door_app"
description: "PIN-geschützte WebApp für Airbnb-Gäste: öffnet Haustür (Ring Intercom) und Wohnungstür (Nuki) über Home Assistant."
url: "https://github.com/mnstrmax/guest-door-app"
arch:
  - aarch64
  - amd64
  - armv7
startup: application
boot: auto
init: false
homeassistant_api: true
map:
  - homeassistant_config:ro
ports:
  3000/tcp: 3000
ports_description:
  3000/tcp: "Web-Oberfläche für Gäste (PIN-Eingabe)"
webui: "http://[HOST]:[PORT:3000]/"
options:
  doorbell_entity_id: "binary_sensor.your_doorbell_ding"
  ring_intercom_entity_id: "lock.your_ring_intercom"
  ring_intercom_service: "unlock"
  nuki_entity_id: "lock.your_nuki_lock"
  nuki_service: "unlock"
  hallway_light_entity_id: ""
  guestroom_light_entity_id: ""
  bell_label: ""
  apartment_side: ""
  room_side: ""
  admin_username: "admin"
  admin_password: ""
  admin_totp_secret: ""
  notify_service: ""
  app_active_entity_id: ""
  guestroom_climate_entity_id: ""
  guestroom_ceiling_light_entity_id: ""
  guestroom_floor_light_entity_id: ""
  airbnb_ical_url: ""
  default_checkin_time: "15:00"
  default_checkout_time: "11:00"
  email_imap_host: ""
  email_imap_user: ""
  email_imap_password: ""
  email_imap_mailbox: "INBOX"
  email_delete_after_sync: false
schema:
  doorbell_entity_id: "str"
  ring_intercom_entity_id: "str"
  ring_intercom_service: "list(unlock|open)"
  nuki_entity_id: "str"
  nuki_service: "list(unlock|open)"
  hallway_light_entity_id: "str?"
  guestroom_light_entity_id: "str?"
  bell_label: "str?"
  apartment_floor: "int?"
  apartment_side: "str?"
  room_number: "int?"
  room_side: "str?"
  admin_username: "str?"
  admin_password: "password"
  admin_totp_secret: "str?"
  notify_service: "str?"
  app_active_entity_id: "str?"
  guestroom_climate_entity_id: "str?"
  guestroom_ceiling_light_entity_id: "str?"
  guestroom_floor_light_entity_id: "str?"
  airbnb_ical_url: "str?"
  default_checkin_time: "str?"
  default_checkout_time: "str?"
  email_imap_host: "str?"
  email_imap_port: "int?"
  email_imap_user: "str?"
  email_imap_password: "password?"
  email_imap_mailbox: "str?"
  email_delete_after_sync: "bool"
