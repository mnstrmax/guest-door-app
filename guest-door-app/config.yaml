name: "Guest Door App"
version: "1.0.0"
slug: "guest_door_app"
description: "PIN-geschützte WebApp für Airbnb-Gäste: öffnet Haustür (Ring Intercom) und Wohnungstür (Nuki) über Home Assistant."
url: ""
arch:
  - aarch64
  - amd64
  - armv7
startup: application
boot: auto
init: false
homeassistant_api: true
ports:
  3000/tcp: 3000
ports_description:
  3000/tcp: "Web-Oberfläche für Gäste (PIN-Eingabe)"
options:
  doorbell_entity_id: "binary_sensor.vordereingang_ding"
  ring_intercom_entity_id: "lock.vordereingang_lock"
  ring_intercom_service: "open"
  nuki_entity_id: "lock.wohnungstuer_nuki"
  nuki_service: "unlock"
  guests:
    - label: "Beispiel-Gast"
      pin: "1234"
      check_in: "2026-07-01T15:00:00"
      check_out: "2026-07-10T11:00:00"
schema:
  doorbell_entity_id: "str"
  ring_intercom_entity_id: "str"
  ring_intercom_service: "list(unlock|open)"
  nuki_entity_id: "str"
  nuki_service: "list(unlock|open)"
  guests:
    - label: "str"
      pin: "str"
      check_in: "str"
      check_out: "str"
