<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin-Login</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #6b73ff, #000dff);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    padding: 16px;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 32px 24px;
    max-width: 360px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
  }
  h1 { margin-top: 0; font-size: 1.3rem; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 0.85rem; margin-bottom: 4px; color: #444; }
  .field input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 1rem;
  }
  .hint { color: #666; font-size: 0.82rem; margin-top: -8px; margin-bottom: 14px; }
  button {
    width: 100%;
    font-size: 1rem;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #000dff;
    color: #fff;
    cursor: pointer;
  }
  button:disabled { opacity: 0.6; cursor: not-allowed; }
  .error { color: #d33; font-size: 0.85rem; min-height: 1.2em; margin-top: 10px; }
</style>
</head>
<body>
  <main class="card">
    <h1>Guest Door App – Admin</h1>
    <form id="login-form">
      <div class="field">
        <label for="username">Benutzername</label>
        <input type="text" id="username" autocomplete="username" required autofocus>
      </div>
      <div class="field">
        <label for="password">Passwort</label>
        <input type="password" id="password" autocomplete="current-password" required>
      </div>
      <div class="field">
        <label for="totp">Code aus der Authenticator-App</label>
        <input type="text" id="totp" inputmode="numeric" pattern="[0-9]*" autocomplete="one-time-code" placeholder="nur falls 2FA aktiviert ist">
      </div>
      <p class="hint">Leer lassen, falls du noch keine Zwei-Faktor-Authentifizierung eingerichtet hast.</p>
      <button type="submit" id="submit-btn">Anmelden</button>
      <p class="error" id="error"></p>
    </form>
  </main>
  <script>
    const form = document.getElementById('login-form');
    const errorEl = document.getElementById('error');
    const submitBtn = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.textContent = '';
      submitBtn.disabled = true;
      try {
        const res = await fetch('/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
            totp: document.getElementById('totp').value.trim(),
          }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          errorEl.textContent = data.error || `Fehler (${res.status})`;
          submitBtn.disabled = false;
          return;
        }
        window.location.href = '/admin';
      } catch (err) {
        errorEl.textContent = 'Verbindung zum Server fehlgeschlagen.';
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
