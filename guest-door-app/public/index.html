<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Willkommen</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="card">
    <div class="lang-switcher" id="lang-switcher">
      <button type="button" data-lang="de">DE</button>
      <button type="button" data-lang="en">EN</button>
      <button type="button" data-lang="fr">FR</button>
      <button type="button" data-lang="es">ES</button>
    </div>

    <h1 id="title"></h1>
    <p class="hint hidden" id="guest-greeting"></p>

    <section id="step-pin" class="step">
      <p id="pin-intro"></p>
      <form id="pin-form">
        <input type="tel" inputmode="numeric" pattern="[0-9]*" id="pin-input"
               placeholder="PIN" autocomplete="off" required>
        <button type="submit" id="pin-submit"></button>
      </form>
      <p class="error" id="pin-error"></p>
    </section>

    <section id="step-bell" class="step hidden">
      <h2 id="bell-title"></h2>
      <p id="bell-text"></p>
      <div class="spinner"></div>
      <p class="hint" id="bell-waiting"></p>
      <p class="error" id="bell-error"></p>
    </section>

    <section id="step-street-open" class="step hidden">
      <h2 id="street-open-title"></h2>
      <p id="street-open-text"></p>
      <button type="button" id="continue-btn"></button>
    </section>

    <section id="step-apartment" class="step hidden">
      <h2 id="apartment-title"></h2>
      <p id="apartment-intro"></p>
      <img src="/images/door.jpg" alt="Wohnungstür" class="guide-photo" onerror="this.style.display='none'">
      <button type="button" id="apartment-btn"></button>
      <p class="error" id="apartment-error"></p>
    </section>

    <section id="step-done" class="step hidden">
      <h2 id="done-title"></h2>
      <p id="done-text"></p>
      <img src="/images/room.jpg" alt="Dein Zimmer" class="guide-photo" onerror="this.style.display='none'">
      <p id="done-footer"></p>
      <button type="button" id="confirm-ok-btn"></button>
      <p class="hint hidden" id="confirm-ok-done"></p>
    </section>

    <section id="step-menu" class="step hidden">
      <h2 id="menu-title"></h2>
      <p id="menu-intro"></p>
      <button type="button" id="menu-doors-btn"></button>
      <button type="button" id="menu-controls-btn"></button>
      <p class="error" id="menu-error"></p>
    </section>

    <section id="step-controls" class="step hidden">
      <h2 id="controls-title"></h2>
      <div id="controls-climate" class="control-block hidden">
        <p id="controls-climate-label"></p>
        <div class="temp-row">
          <button type="button" id="climate-minus">−</button>
          <span id="climate-value">–</span>
          <button type="button" id="climate-plus">+</button>
        </div>
      </div>
      <div id="controls-ceiling" class="control-block hidden">
        <p id="controls-ceiling-label"></p>
        <button type="button" id="ceiling-toggle"></button>
      </div>
      <div id="controls-floor" class="control-block hidden">
        <p id="controls-floor-label"></p>
        <button type="button" id="floor-toggle"></button>
      </div>
      <button type="button" id="controls-back-btn"></button>
      <p class="error" id="controls-error"></p>
    </section>
  </main>
  <script src="i18n.js"></script>
  <script src="app.js"></script>
</body>
</html>
